<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adepta SKOG — Asiakas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --fd:   #1c2b1e;
  --fm:   #2d4a31;
  --fl:   #3d6b43;
  --fg:   #7ec488;
  --fmist:#e8efe9;
  --fpale:#f2f6f2;
  --moss: #6b8f4e;
  --am:   #a05c1a;
  --aml:  #fdf3e8;
  --ink:  #1a1c18;
  --inm:  #3d4039;
  --inu:  #7a7d72;
  --inf:  #b8bab2;
  --pp:   #fafaf7;
  --ppw:  #f5f3ee;
  --bd:   #dddbd4;
  --bd2:  #c4c2b8;
  --ffd:  'Fraunces',Georgia,serif;
  --ffb:  'DM Sans',sans-serif;
  --ffm:  'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ffb);background:var(--ppw);color:var(--ink);font-size:14px;min-height:100vh}

.topbar{background:var(--fd);color:#fff;height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

.bc{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.45);margin-left:20px}
.bc span.a{color:rgba(255,255,255,.8)}
.bc-sep{color:rgba(255,255,255,.2)}
.tr{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.5);font-family:var(--ffd);font-style:italic}

.layout{display:flex;height:calc(100vh - 56px)}

.sb{width:220px;background:var(--fd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sbh{padding:16px 14px 12px}
.sbl{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);display:block;margin-bottom:8px}
.asrch{width:100%;padding:7px 10px;font-family:var(--ffb);font-size:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#fff;outline:none;transition:all .12s}
.asrch::placeholder{color:rgba(255,255,255,.28)}
.asrch:focus{background:rgba(255,255,255,.11);border-color:var(--fg)}
.alist{overflow-y:auto;flex:1;padding:4px 0}
.ai{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .08s}
.ai:hover{background:rgba(255,255,255,.05)}
.ai.act{background:rgba(126,196,136,.11);border-left-color:var(--fg)}
.an{font-size:13px;font-weight:400;color:rgba(255,255,255,.82)}
.am2{font-size:11px;color:rgba(255,255,255,.33);margin-top:2px}

.sb-nav{padding:8px 0;border-top:1px solid rgba(255,255,255,.07)}
.sb-nav a{display:block;padding:8px 14px;font-size:12px;color:rgba(255,255,255,.45);text-decoration:none;transition:all .08s}
.sb-nav a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04)}
.sbf{padding:10px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.28)}
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--pp)}

.ak-header{padding:16px 24px 0;flex-shrink:0}
.ak-header h1{font-family:var(--ffd);font-weight:400;font-size:22px;color:var(--ink);margin-bottom:6px}
.ak-badge{display:inline-block;padding:2px 10px;font-size:11px;font-family:var(--ffm);background:var(--fmist);color:var(--moss);border-radius:20px;border:1px solid #c5dfc8}

.tab-bar{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--bd);background:var(--pp);flex-shrink:0;margin-top:12px}
.tab-btn{padding:10px 18px;font-family:var(--ffb);font-size:13px;color:var(--inu);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .1s;margin-bottom:-1px}
.tab-btn:hover{color:var(--ink)}
.tab-btn.act{color:var(--fm);border-bottom-color:var(--fm);font-weight:500}

.tab-panel{flex:1;overflow:hidden}

.yht-wrap{padding:24px;overflow-y:auto;height:100%}

.card{background:var(--pp);border:1px solid var(--bd);border-radius:10px;margin-bottom:20px;overflow:hidden}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--inu)}
.card-body{padding:16px}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:12px 24px}
.info-item label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--inu);display:block;margin-bottom:3px}
.info-item span{font-size:13px;color:var(--ink)}
.info-item span.mono{font-family:var(--ffm);font-size:12px}

.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:7px 12px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--inu);border-bottom:1px solid var(--bd)}
.data-table th.num{text-align:right}
.data-table td{padding:8px 12px;border-bottom:1px solid var(--bd);color:var(--ink)}
.data-table td.num{text-align:right;font-family:var(--ffm);font-size:12px}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--ppw)}
.empty-row td{color:var(--inu);font-style:italic;text-align:center;padding:16px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--inu);font-size:13px}
.empty-state-i{font-family:var(--ffd);font-style:italic;font-size:48px;color:var(--inf);font-weight:300;line-height:1}

iframe{display:block;width:100%;height:calc(100vh - 116px);border:none}

/* Vuosi modal */
.v-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center}
.v-overlay.open{display:flex}
.v-modal{background:#fff;border-radius:10px;padding:28px 28px 24px;width:100%;max-width:400px;margin:1rem;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.v-modal h2{font-family:var(--ffd);font-weight:300;font-size:1.2rem;color:var(--ink);margin-bottom:16px}
.v-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--inu);display:block;margin-bottom:4px}
.v-sel{width:100%;padding:8px 10px;font-family:var(--ffb);font-size:14px;background:#fff;border:1px solid var(--bd);border-radius:5px;color:var(--ink);outline:none}
.v-sel:focus{border-color:var(--fm)}
.v-warn{background:#fff3f3;border:1px solid #fca5a5;border-radius:6px;padding:10px 12px;font-size:12px;color:#b91c1c;margin:10px 0}
.v-hint{font-size:12px;color:var(--inu);background:var(--ppw);padding:8px 10px;border-radius:5px;margin:10px 0}
.v-btn-row{display:flex;gap:8px;margin-top:16px}
.v-btn-row button{flex:1;padding:8px 0;font-family:var(--ffb);font-size:13px;font-weight:500;border-radius:5px;border:none;cursor:pointer}
.v-btn-save{background:var(--fm);color:#fff}
.v-btn-save:hover{background:var(--fl)}
.v-btn-cancel{background:transparent;color:var(--inu);border:1px solid var(--bd) !important}
.v-btn-cancel:hover{background:var(--ppw)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<div class="layout">
  <!-- Sidebar -->
  <div class="sb">
    <div class="sb-logo">
      <svg width="110" height="22" viewBox="0 0 176 36" xmlns="http://www.w3.org/2000/svg" style="display:block;margin-bottom:4px;opacity:.7">
        <rect x="0"  y="2"  width="14" height="32" rx="2" fill="#5DCAA5"/>
        <rect x="18" y="2"  width="14" height="19" rx="2" fill="#1D9E75"/>
        <rect x="18" y="24" width="14" height="10" rx="2" fill="#0F6E56"/>
        <text x="40" y="19" font-family="Fraunces,Georgia,serif" font-weight="300" font-size="15" fill="#ffffff" dominant-baseline="middle" letter-spacing="0.2">Adepta</text>
        <circle cx="96" cy="18" r="2.5" fill="#5DCAA5"/>
        <text x="102" y="19" font-family="Fraunces,Georgia,serif" font-weight="500" font-style="italic" font-size="15" fill="#5DCAA5" dominant-baseline="middle" letter-spacing="0.2">SKOG</text>

      <button class="v-btn-save" id="vuosi-btn-save" onclick="vaihdaVuosi()">Tallenna</button>

<script>
const _sb = supabase.createClient(window._SKOG.supabaseUrl, window._SKOG.supabaseKey);
let ASIAKKAAT = window._SKOG.asiakkaat || [];
let curAs = null;
let fAs = [...ASIAKKAAT];
let asHL = -1;

// Set email in footer
document.getElementById('sbf-email').textContent = window._SKOG.email || '';

function fmt(n) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('fi-FI', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(s) {
  if (!s) return '—';
  return s.substring(0, 10);
}

// Load customers from Supabase (re-fetch for full details)
async function lataaAsiakkaat() {
  const { data } = await _sb.from('asiakkaat')
    .select('id, etunimi, sukunimi, kotikunta, avoin_vuosi')
    .eq('organisaatio_id', window._SKOG.orgId)
    .order('sukunimi');
  if (data) {
    ASIAKKAAT = data.map(a => ({ id: a.id, nimi: a.sukunimi + ', ' + a.etunimi, tila: a.kotikunta || '', avoin_vuosi: a.avoin_vuosi }));
    fAs = [...ASIAKKAAT];
    renderAs();
    // URL param auto-select
    const urlId = new URLSearchParams(location.search).get('id');
    if (urlId) selAs(urlId);
  }
}

function renderAs() {
  const html = fAs.map((a, i) =>
    '<div class="ai' + (curAs && curAs.id === a.id ? ' act' : '') + (i === asHL ? ' hl' : '') +
    '" onclick="selAs(\'' + a.id + '\')">' +
    '<div class="an">' + a.nimi + '</div>' +
    (a.tila ? '<div class="am2">' + a.tila + '</div>' : '') +
    '</div>'
  ).join('');
  document.getElementById('alist').innerHTML = html || '<div style="padding:12px 14px;font-size:12px;color:rgba(255,255,255,.3)">Ei asiakkaita</div>';
}

function filterAs(q) {
  fAs = ASIAKKAAT.filter(a => a.nimi.toLowerCase().includes(q.toLowerCase()));
  asHL = fAs.length > 0 ? 0 : -1;
  renderAs();
}

function asKey(e) {
  if (e.key === 'ArrowDown') { e.preventDefault(); asHL = Math.min(asHL + 1, fAs.length - 1); renderAs(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); asHL = Math.max(asHL - 1, 0); renderAs(); }
  else if (e.key === 'Enter' && asHL >= 0 && fAs[asHL]) selAs(fAs[asHL].id);
}

function selAs(id) {
  curAs = ASIAKKAAT.find(a => a.id === id);
  if (!curAs) return;
  // Update URL without reload
  const url = new URL(location.href);
  url.searchParams.set('id', id);
  history.replaceState(null, '', url.toString());
  updateHeader();
  showTab('yhteenveto');
  loadYhteenveto();
  updateFrames();
  renderAs();
}

function updateHeader() {
  document.getElementById('bc-as').textContent = curAs ? curAs.nimi : 'Valitse asiakas';
  document.getElementById('ak-header').style.display = curAs ? 'block' : 'none';
  if (curAs) {
    document.getElementById('ak-nimi').textContent = curAs.nimi;
    document.getElementById('ak-vuosi').textContent = 'Avoin vuosi: ' + (curAs.avoin_vuosi || window._SKOG.avoinVuosi || 2025);
  }
}

// Tab switching
let activeTab = 'yhteenveto';
let frameLoaded = {};

function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('act', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => { p.style.display = p.id === 'tab-' + name ? 'flex' : 'none'; });
  // Yhteenveto uses block not flex
  if (name === 'yhteenveto') document.getElementById('tab-yhteenveto').style.display = 'block';
  if (name !== 'yhteenveto' && curAs && !frameLoaded[name]) {
    const frame = document.getElementById('frame-' + name);
    const paths = { kirjanpito: '/kirjanpito', alv: '/alv', verosuunnitelma: '/verosuunnitelma', veroraportti: '/veroraportti' };
    frame.src = paths[name] + '?embed=1&asiakas_id=' + curAs.id;
    frameLoaded[name] = true;
  }
}

function updateFrames() {
  frameLoaded = {};
  ['kirjanpito', 'alv', 'verosuunnitelma', 'veroraportti'].forEach(name => {
    const frame = document.getElementById('frame-' + name);
    if (frame) frame.src = '';
  });
  if (activeTab !== 'yhteenveto') {
    showTab(activeTab);
  }
}

// Yhteenveto: load customer details
async function loadYhteenveto() {
  if (!curAs) return;
  const id = curAs.id;
  document.getElementById('yht-content').innerHTML = '<div style="padding:2rem;color:var(--inu)">Ladataan...</div>';

  const [
    { data: ak },
    { data: metsatilat },
    { data: investoinnit },
    { data: arkisto },
  ] = await Promise.all([
    _sb.from('asiakkaat').select('etunimi, sukunimi, y_tunnus, kotikunta, sahkoposti, puhelin, osoite, postinumero, postitoimipaikka, verotiliviite, alv_rekisterissa, avoin_vuosi, luotu_at').eq('id', id).single(),
    _sb.from('metsatilat').select('id, nimi, kiinteistotunnus, pinta_ala_ha, hankintahinta').eq('asiakas_id', id).order('nimi'),
    _sb.from('investoinnit').select('id, kuvaus, hankintahinta, poistotapa, poistoaika_vuotta').eq('asiakas_id', id).eq('aktiivinen', true),
    _sb.from('arkisto').select('id, verovuosi, luotu_at').eq('asiakas_id', id).order('verovuosi', { ascending: false }),
  ]);

  let html = '';

  // Perustiedot card
  html += '<div class="card">';
  html += '<div class="card-hdr">Perustiedot</div>';
  html += '<div class="card-body"><div class="info-grid">';
  const infoItems = [
    ['Etunimi', ak?.etunimi || '—'],
    ['Sukunimi', ak?.sukunimi || '—'],
    ['Y-tunnus', ak?.y_tunnus || '—', true],
    ['Kotikunta', ak?.kotikunta || '—'],
    ['Sähköposti', ak?.sahkoposti || '—'],
    ['Puhelin', ak?.puhelin || '—'],
    ['Osoite', ak?.osoite || '—'],
    ['Postinumero', ak?.postinumero || '—', true],
    ['Postitoimipaikka', ak?.postitoimipaikka || '—'],
    ['Verotiliviite', ak?.verotiliviite || '—', true],
    ['ALV-rekisterissä', ak?.alv_rekisterissa ? 'Kyllä' : 'Ei'],
    ['Luotu', fmtDate(ak?.luotu_at)],
  ];
  infoItems.forEach(([lbl, val, mono]) => {
    html += '<div class="info-item"><label>' + lbl + '</label><span' + (mono ? ' class="mono"' : '') + '>' + (val || '—') + '</span></div>';
  });
  html += '</div></div></div>';

  // Verovuosi card
  const avVuosi = ak?.avoin_vuosi || 2025;
  html += '<div class="card">';
  html += '<div class="card-hdr">Verovuosi</div>';
  html += '<div class="card-body" style="display:flex;align-items:center;gap:2rem">';
  html += '<div><p style="font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--inu);margin-bottom:4px">Avoin verovuosi</p>';
  html += '<p style="font-family:var(--ffd);font-weight:300;font-size:2rem;color:var(--fm);margin:0">' + avVuosi + '</p></div>';
  html += '<div style="flex:1;font-size:12px;color:var(--inu)">Sulje vuosi vaihtamalla avoin verovuosi seuraavalle vuodelle.</div>';
  html += '<button onclick="avaaVuosiModal()" style="padding:6px 16px;background:transparent;color:var(--fm);border:1px solid var(--fm);border-radius:5px;font-family:var(--ffb);font-size:13px;cursor:pointer">Vaihda vuosi</button>';
  html += '</div></div>';

  // Metsätilat card
  html += '<div class="card">';
  html += '<div class="card-hdr">Metsätilat (' + (metsatilat ? metsatilat.length : 0) + ')</div>';
  html += '<table class="data-table">';
  html += '<thead><tr><th>Nimi</th><th>Kiinteistötunnus</th><th class="num">Pinta-ala (ha)</th><th class="num">Hankintahinta (€)</th></tr></thead>';
  html += '<tbody>';
  if (metsatilat && metsatilat.length > 0) {
    metsatilat.forEach(t => {
      html += '<tr><td>' + (t.nimi || '—') + '</td><td style="font-family:var(--ffm);font-size:12px">' + (t.kiinteistotunnus || '—') + '</td><td class="num">' + fmt(t.pinta_ala_ha) + '</td><td class="num">' + fmt(t.hankintahinta) + '</td></tr>';
    });
    // Total row
    const totalHa = (metsatilat || []).reduce((s, t) => s + (t.pinta_ala_ha || 0), 0);
    const totalHinta = (metsatilat || []).reduce((s, t) => s + (t.hankintahinta || 0), 0);
    html += '<tr style="font-weight:600;background:var(--fmist)"><td colspan="2" style="padding:8px 12px;font-size:12px;color:var(--inu)">Yhteensä</td><td class="num">' + fmt(totalHa) + '</td><td class="num">' + fmt(totalHinta) + '</td></tr>';
  } else {
    html += '<tr class="empty-row"><td colspan="4">Ei metsätiloja</td></tr>';
  }
  html += '</tbody></table></div>';

  // Investoinnit card
  html += '<div class="card">';
  html += '<div class="card-hdr">Aktiiviset investoinnit (' + (investoinnit ? investoinnit.length : 0) + ')</div>';
  html += '<table class="data-table">';
  html += '<thead><tr><th>Kuvaus</th><th class="num">Hankintahinta (€)</th><th>Poistotapa</th><th class="num">Poistoaika (v)</th></tr></thead>';
  html += '<tbody>';
  if (investoinnit && investoinnit.length > 0) {
    investoinnit.forEach(inv => {
      html += '<tr><td>' + (inv.kuvaus || '—') + '</td><td class="num">' + fmt(inv.hankintahinta) + '</td><td>' + (inv.poistotapa || '—') + '</td><td class="num">' + (inv.poistoaika_vuotta || '—') + '</td></tr>';
    });
  } else {
    html += '<tr class="empty-row"><td colspan="4">Ei aktiivisia investointeja</td></tr>';
  }
  html += '</tbody></table></div>';

  // Arkisto card
  html += '<div class="card">';
  html += '<div class="card-hdr">Arkisto (' + (arkisto ? arkisto.length : 0) + ')</div>';
  html += '<table class="data-table">';
  html += '<thead><tr><th>Verovuosi</th><th>Luotu</th></tr></thead>';
  html += '<tbody>';
  if (arkisto && arkisto.length > 0) {
    arkisto.forEach(a => {
      html += '<tr><td style="font-family:var(--ffm);font-weight:600">' + (a.verovuosi || '—') + '</td><td>' + fmtDate(a.luotu_at) + '</td></tr>';
    });
  } else {
    html += '<tr class="empty-row"><td colspan="2">Ei arkistoituja vuosia</td></tr>';
  }
  html += '</tbody></table></div>';

  document.getElementById('yht-content').innerHTML = html;
}

// Vuosi modal
function avaaVuosiModal() {
  const nykyinen = curAs?.avoin_vuosi || 2025;
  const sel = document.getElementById('vuosi-valinta');
  sel.value = nykyinen;
  document.getElementById('vuosi-varoitus').style.display = 'none';
  document.getElementById('vuosi-hint').style.display = 'none';
  document.getElementById('vuosi-overlay').classList.add('open');
  paivitaVuosiHint();
}

function suljeMuokkaaVuosi() {
  document.getElementById('vuosi-overlay').classList.remove('open');
}

function paivitaVuosiHint() {
  const nykyinen = curAs?.avoin_vuosi || 2025;
  const vuosi = parseInt(document.getElementById('vuosi-valinta').value);
  const warn = document.getElementById('vuosi-varoitus');
  const hint = document.getElementById('vuosi-hint');
  if (vuosi < nykyinen) {
    warn.textContent = 'Avaat jo suljetun verovuoden (' + vuosi + '). Tämä on poikkeustilanne.';
    warn.style.display = 'block';
    hint.style.display = 'none';
  } else if (vuosi > nykyinen) {
    warn.style.display = 'none';
    hint.textContent = 'Vuosi ' + nykyinen + ' suljetaan ja tallennetaan arkistoon. Uusi avoin vuosi on ' + vuosi + '.';
    hint.style.display = 'block';
  } else {
    warn.style.display = 'none';
    hint.style.display = 'none';
  }
}

async function vaihdaVuosi() {
  const vuosi = parseInt(document.getElementById('vuosi-valinta').value);
  const nykyinen = curAs.avoin_vuosi || 2025;
  if (vuosi < nykyinen) {
    if (!confirm('Olet avaamassa jo suljettua vuotta ' + vuosi + ', jonka tiedot on mahdollisesti ilmoitettu verottajalle. Oletko varma?')) return;
  }
  if (vuosi > nykyinen) {
    await _sb.from('arkisto').upsert({
      asiakas_id: curAs.id,
      verovuosi: nykyinen,
      tiedostonimi: 'veroraportti_' + nykyinen + '.pdf',
      pdf_data: 'archived_' + nykyinen,
    }, { onConflict: 'asiakas_id,verovuosi' });
  }
  await _sb.from('asiakkaat').update({ avoin_vuosi: vuosi }).eq('id', curAs.id);
  curAs.avoin_vuosi = vuosi;
  suljeMuokkaaVuosi();
  lataaAsiakastiedot();
  toast('Avoin verovuosi vaihdettu: ' + vuosi);
}

function lataaAsiakastiedot() {
  updateHeader();
  loadYhteenveto();
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--fd);color:#e8f0e9;padding:10px 22px;border-radius:6px;font-size:13px;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Init
lataaAsiakkaat();
</script>
